<div class="flex bg-primary rounded-lg px-6 sm:px-10 md:px-12 lg:px-14 my-20 md:mx-10">
  <!-- .................. left side...................  -->
  <div class="flex-1 py-8 sm:py-10 md:py-16 lg:py-24 lg:pl-5">
    <div class="text-xl sm:text-2xl md:text-3xl lg:text-5xl font-semibold text-white">
      <p>Book Appointment</p>
      <p class="mt-4">With 100+ Trusted Doctors</p>
    </div>
    <button
      routerLink="/login"
      class="bg-white text-sm sm:text-base text-gray-600 px-8 py-3 rounded-full mt-6 hover:scale-105 transition-all duration-300 cursor-pointer"
    >
      Create account
    </button>
  </div>

  <!-- .................. right side...................  -->
  <div class="hidden md:block md:w-1/2 lg:w-[370px] relative">
    <img class="w-full absolute right-0 bottom-0 max-w-md" [src]="appointmentImg" alt="" />
  </div>
</div>
