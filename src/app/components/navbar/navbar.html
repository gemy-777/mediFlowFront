<!-- navbar html -->
<div class="flex justify-between items-center border-b border-b-gray-400 mb-5 py-4">
  <img [src]="logo" routerLink="/" alt="" class="w-44 cursor-pointer" />
  <ul class="hidden md:flex items-start gap-5 font-medium">
    @for (link of myLinks; track $index) {
      <li class="py-1 cursor-pointer" routerLinkActive="active" [routerLink]="[link.toLowerCase()]">
        {{ link }}
        <hr class="border-none outline-none h-0.5 bg-primary w-3/5 m-auto hidden" />
      </li>
    }
  </ul>
  <div>
    <div class="flex items-center gap-4">
      @if (token && userDate) {
        <div class="flex items-center gap-2 cursor-pointer group relative group-container">
          <img class="w-8 rounded-full" [src]="userDate.image" alt="" />
          <img class="w-2.5" [src]="dropdownIcon" alt="" />
          <div
            class="absolute top-0 right-0 pt-14 text-base font-medium text-gray-600 z-20 hidden group-hover:block dropdown-content"
          >
            <div class="min-w-48 bg-stone-100 rounded flex flex-col gap-4 p-4">
              <p class="hover:text-black cursor-pointer" routerLink="my-profile">My Profile</p>
              <p class="hover:text-black cursor-pointer" routerLink="my-appointments">
                My Appointments
              </p>
              <!-- <p class="hover:text-black cursor-pointer" (click)="updateToken()">Logout</p> -->
              <p class="hover:text-black cursor-pointer" (click)="logout()">Logout</p>
            </div>
          </div>
        </div>
      } @else {
        <button
          class="bg-primary text-white px-8 py-3 rounded-full font-light hidden md:block"
          routerLink="/login"
        >
          Creat account
        </button>
      }
      <img (click)="setShowMenu(true)" class="w-6 md:hidden" [src]="menuIcon" alt="" />
      <!-- .......mobile menu -->
      <div
        [ngClass]="showMenu() ? 'fixed w-full' : 'h-0 w-0'"
        class="md:hidden right-0 top-0 bottom-0 z-20 overflow-hidden bg-white transition-all"
      >
        <div class="flex items-center justify-between px-5 py-6">
          <img class="w-36" [src]="logo" alt="" />
          <img class="w-7" (click)="setShowMenu(false)" [src]="crossIcon" alt="" />
        </div>

        <ul class="flex flex-col items-center gap-2 mt-5 px-5 text-lg font-medium">
          @for (link of myLinks; track $index) {
            <li
              (click)="setShowMenu(false)"
              routerLinkActive="active"
              [routerLink]="['/', link.toLocaleLowerCase()]"
            >
              <p class="px-4 py-2 rounded inline-block">{{ link }}</p>
            </li>
          }
        </ul>
      </div>
    </div>
  </div>
</div>
