<div>
  <p class="pd-3 mt-12 font-medium text-zinc-700 border-b">My appointments</p>
  <div>
    @for (doctor of allDoctors | slice: 0 : 3; track doctor._id) {
      <div class="grid grid-cols-[1fr_2fr] gap-4 sm:flex sm:gap-6 py-2 border-b">
        <div>
          <img class="w-32 bg-indigo-50" [src]="doctor.image" alt="" />
        </div>
        <div class="flex-1 text-sm text-zinc-600">
          <p class="text-neutral-800 font-semibold">{{ doctor.name }}</p>
          <p>{{ doctor.speciality }}</p>
          <p class="text-zinc-700 font-medium mt-1">Address:</p>
          <p class="text-xs">{{ doctor.address.line1 }}</p>
          <p class="text-xs">{{ doctor.address.line2 }}</p>
          <p class="text-sm mt-1">
            <span class="text-sm text-neutral-700 font-medium">Date & Time:</span>
            25, July, 2024 | 8:30 PM
          </p>
        </div>
        <div></div>
        <div class="flex flex-col gap-2 justify-end">
          <button
            class="text-sm text-ston-500 text-center sm:min-w-48 py-2 border rounded hover:bg-primary hover:text-white transition-all duration-300"
          >
            Pay Online
          </button>
          <button
            class="text-sm text-ston-500 text-center sm:min-w-48 py-2 border rounded hover:bg-red-600 hover:text-white transition-all duration-300"
          >
            Cancel appointment
          </button>
        </div>
      </div>
    }
  </div>
</div>
